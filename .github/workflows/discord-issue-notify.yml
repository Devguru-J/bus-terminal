name: Discord Issue Notify

on:
  issues:
    types: [opened, reopened]
  workflow_dispatch:

permissions:
  issues: read

jobs:
  notify:
    name: Send issue summary to Discord
    runs-on: ubuntu-latest

    steps:
      - name: Verify Discord webhook secret
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "::error::Missing repository secret DISCORD_WEBHOOK_URL"
            exit 1
          fi

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          webhook_url = os.environ["DISCORD_WEBHOOK_URL"]
          repository = os.environ["GITHUB_REPOSITORY"]
          event_path = os.environ["GITHUB_EVENT_PATH"]

          with open(event_path, encoding="utf-8") as f:
              event = json.load(f)

          issue = event.get("issue")
          sender = event.get("sender", {}).get("login", "unknown")

          if issue:
              labels = ", ".join(label["name"] for label in issue.get("labels", [])) or "no label"
              title = issue["title"]
              issue_url = issue["html_url"]
              issue_user = issue.get("user", {}).get("login", sender)
              issue_number = issue["number"]
          else:
              labels = "manual test"
              title = "Discord issue notification test"
              issue_url = (
                  f'{os.environ["GITHUB_SERVER_URL"]}/{repository}/actions/runs/'
                  f'{os.environ["GITHUB_RUN_ID"]}'
              )
              issue_user = sender
              issue_number = "test"

          payload = {
              "username": "BusTerminal Feedback",
              "embeds": [
                  {
                      "title": f"새 의견 #{issue_number}",
                      "url": issue_url,
                      "description": title,
                      "color": 0x00E55B,
                      "fields": [
                          {"name": "Repository", "value": repository, "inline": True},
                          {"name": "Labels", "value": labels, "inline": True},
                          {"name": "Author", "value": issue_user, "inline": True},
                          {"name": "Open", "value": issue_url, "inline": False},
                      ],
                  }
              ],
          }

          data = json.dumps(payload).encode("utf-8")
          req = urllib.request.Request(
              webhook_url,
              data=data,
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=10) as res:
              if res.status >= 300:
                  raise SystemExit(f"Discord webhook failed with HTTP {res.status}")
          PY
